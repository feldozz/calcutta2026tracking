<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FREEMAN — Live Tracker</title>
<link rel="apple-touch-icon" sizes="180x180" href="data:image/png;base64,iVBORw0KGgo=">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06060b">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#06060b;--card:#0c0c14;--border:#1a1a28;--text:#e2e8f0;--muted:#64748b;--dim:#374151;--green:#22c55e;--gl:#4ade80;--red:#dc2626;--rl:#f87171;--amber:#f59e0b;--al:#fbbf24}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;-webkit-font-smoothing:antialiased}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

/* ── Header ── */
.hdr{background:linear-gradient(135deg,#0e1225,#160a24,#0a1420);border-bottom:2px solid var(--green);padding:12px 16px;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;gap:10px}
.mascot{width:42px;height:42px;border-radius:50%;border:2px solid var(--green);object-fit:cover;object-position:center top}
.brand{font-family:Outfit,sans-serif;font-size:24px;font-weight:900;letter-spacing:-1px;background:linear-gradient(90deg,var(--green),var(--gl));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:9px;color:var(--muted);letter-spacing:2px}

/* ── Stats strip ── */
.stats{display:flex;gap:2px;margin-top:10px;background:#0a0a12;border-radius:6px;overflow:hidden}
.st{flex:1;text-align:center;padding:6px 4px}
.st-l{font-size:7px;color:var(--muted);letter-spacing:1.5px;white-space:nowrap}
.st-v{font-size:14px;font-weight:700;margin-top:1px}
.st-s{font-size:8px;color:#94a3b8}

.conn{margin-top:6px;font-size:9px;color:var(--muted);display:flex;align-items:center;gap:5px}
.conn-d{width:5px;height:5px;border-radius:50%}
.rbtn{margin-left:auto;padding:3px 10px;font-size:9px;font-family:inherit;border:1px solid #334155;border-radius:3px;background:transparent;color:#94a3b8;cursor:pointer}
.cpbtn{padding:4px 10px;font-size:9px;font-family:inherit;border:1px solid #334155;border-radius:4px;background:transparent;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:all .2s}
.cpbtn:active{background:var(--green);color:#000;border-color:var(--green)}
.cpbtn.copied{background:var(--green);color:#000;border-color:var(--green)}

/* ── Filters ── */
.filters{display:flex;gap:5px;padding:8px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid var(--border);background:#0a0a12}
.fbtn{padding:5px 10px;font-size:10px;font-weight:600;font-family:inherit;letter-spacing:.5px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0}
.fbtn.ar{border-color:var(--green);background:#0d3320;color:var(--gl)}
.fbtn.as{border-color:#818cf8;background:#1e1b4b;color:#a5b4fc}

/* ── Payouts ── */
.payouts{display:flex;margin:8px 12px;background:#0d1117;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.po{flex:1;padding:6px 2px;text-align:center;border-right:1px solid var(--border)}
.po:last-child{border-right:none}
.po-l{font-size:7px;color:var(--muted);letter-spacing:1px}
.po-v{font-size:10px;font-weight:700;margin-top:1px}

/* ── Team cards (mobile-first) ── */
.cards{padding:4px 12px 24px}
.card{border-radius:8px;padding:12px;margin-bottom:6px;position:relative;overflow:hidden}
.card.dead{opacity:.4}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-team{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tname{font-family:Outfit,sans-serif;font-size:15px;font-weight:700;color:#f1f5f9}
.tname.x{color:#555;text-decoration:line-through}
.sbadge{font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;background:#1e293b;color:#94a3b8}
.stb{font-size:8px;font-weight:800;padding:2px 6px;border-radius:3px;letter-spacing:.5px}
.stb-live{background:var(--red);color:#fff;animation:pulse 1.2s infinite}
.stb-win{background:var(--green);color:#000}
.stb-out{background:#4b5563;color:#9ca3af}

.card-prob{text-align:right}
.prob-n{font-size:28px;font-weight:800;line-height:1}
.prob-t{font-size:7px;font-weight:700;letter-spacing:1.5px;margin-top:2px}

.card-meta{font-size:9px;color:#4b5563;margin-top:4px}
.own-tag{color:var(--amber);margin-left:4px}

/* Score row */
.score-row{display:flex;align-items:center;gap:8px;margin-top:8px;padding:8px;background:rgba(0,0,0,.3);border-radius:6px}
.sc-side{text-align:center;min-width:36px}
.sc-lbl{font-size:7px;letter-spacing:1px}
.sc-n{font-size:24px;font-weight:800;line-height:1}
.sc-dash{color:#4b5563;font-weight:600;font-size:10px}
.sc-info{flex:1}
.sc-opp{font-size:12px;font-weight:600;color:#cbd5e1}
.sc-clk{font-size:9px;color:#94a3b8;margin-top:1px}

.matchup{margin-top:6px;font-size:11px;color:#cbd5e1}
.spread{font-size:10px;color:#4b5563;margin-top:1px}

/* Bottom stats row */
.card-bottom{display:flex;gap:4px;margin-top:8px}
.cb-item{flex:1;text-align:center;padding:4px;background:rgba(0,0,0,.2);border-radius:4px}
.cb-l{font-size:7px;color:#4b5563;letter-spacing:1px}
.cb-v{font-size:12px;font-weight:700;margin-top:1px}

/* Hedge calculator */
.hedge-btn{margin-top:8px;width:100%;padding:8px;font-size:10px;font-weight:700;font-family:inherit;letter-spacing:1px;border:1px dashed var(--amber);border-radius:6px;background:rgba(245,158,11,.08);color:var(--amber);cursor:pointer;text-transform:uppercase}
.hedge-btn:hover{background:rgba(245,158,11,.15)}
.hedge-panel{margin-top:8px;padding:12px;background:rgba(0,0,0,.4);border:1px solid var(--amber);border-radius:8px;display:none}
.hedge-panel.open{display:block}
.hedge-title{font-family:Outfit,sans-serif;font-size:13px;font-weight:700;color:var(--al);margin-bottom:8px}
.hedge-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.hedge-label{font-size:9px;color:var(--muted);letter-spacing:1px;min-width:90px}
.hedge-input{background:#111;border:1px solid #333;border-radius:4px;padding:6px 10px;font-size:13px;font-family:inherit;color:var(--text);width:100px;text-align:center}
.hedge-input:focus{outline:none;border-color:var(--amber)}
.hedge-input::placeholder{color:#555}
.hedge-hint{font-size:8px;color:#555;margin-top:-4px;margin-bottom:8px}
.hedge-results{border-top:1px solid #333;padding-top:8px;margin-top:4px}
.hedge-stat{display:flex;justify-content:space-between;padding:4px 0;font-size:11px}
.hedge-stat-l{color:var(--muted)}
.hedge-stat-v{font-weight:700}
.hedge-scenario{margin-top:8px;padding:8px;border-radius:6px;font-size:10px}
.hedge-scenario.win{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3)}
.hedge-scenario.lose{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3)}
.hedge-scenario-title{font-weight:700;margin-bottom:4px;font-size:11px}
.hedge-guarantee{margin-top:10px;padding:10px;background:rgba(245,158,11,.1);border:1px solid var(--amber);border-radius:6px;text-align:center}
.hedge-guarantee-l{font-size:8px;color:var(--amber);letter-spacing:2px}
.hedge-guarantee-v{font-size:20px;font-weight:800;margin-top:2px}

.legend{padding:8px 12px 16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.lg-i{display:flex;align-items:center;gap:4px}
.lg-d{width:8px;height:8px;border-radius:2px}
.lg-t{font-size:8px;color:var(--muted);letter-spacing:.5px}
.footer{padding:10px 12px;border-top:1px solid var(--border);text-align:center;font-size:8px;color:var(--dim);letter-spacing:.5px}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);background:#0a0a12}
.tab{flex:1;padding:10px 12px;font-size:11px;font-weight:700;font-family:inherit;letter-spacing:1px;border:none;background:transparent;color:var(--muted);cursor:pointer;text-align:center;text-transform:uppercase;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:var(--gl);border-bottom-color:var(--green);background:rgba(34,197,94,.05)}
.tab-content{display:none}
.tab-content.active{display:block}

/* Standings */
.standings{padding:12px}
.standings-title{font-family:Outfit,sans-serif;font-size:18px;font-weight:800;color:var(--text);margin-bottom:12px;text-align:center;letter-spacing:-0.5px}
.stand-card{padding:12px;margin-bottom:6px;border-radius:8px;background:var(--card);border:1px solid var(--border)}
.stand-rank{font-family:Outfit,sans-serif;font-size:22px;font-weight:900;color:var(--muted);margin-right:10px;min-width:28px;text-align:center}
.stand-top{display:flex;align-items:center;gap:8px}
.stand-name{font-family:Outfit,sans-serif;font-size:16px;font-weight:800;flex:1}
.stand-pl{text-align:right}
.stand-pl-v{font-size:18px;font-weight:800}
.stand-pl-pct{font-size:9px;margin-top:1px}
.stand-stats{display:flex;gap:4px;margin-top:8px}
.stand-stat{flex:1;text-align:center;padding:5px;background:rgba(0,0,0,.3);border-radius:4px}
.stand-stat-l{font-size:7px;color:var(--muted);letter-spacing:1px}
.stand-stat-v{font-size:12px;font-weight:700;margin-top:1px}
.stand-teams{margin-top:8px;font-size:9px;color:var(--muted);line-height:1.6}
.stand-team-alive{color:#94a3b8}
.stand-team-dead{color:#4b5563;text-decoration:line-through}
.stand-team-won{color:var(--gl)}

/* Desktop: widen cards */
@media(min-width:768px){
  .cards{padding:4px 24px 32px}
  .card{display:grid;grid-template-columns:1.8fr 1.8fr .7fr .8fr .8fr .8fr;align-items:center;gap:10px;padding:12px 16px}
  .card-top{display:contents}
  .card-team{grid-column:1}
  .card-prob{grid-column:3}
  .score-row,.matchup-wrap{grid-column:2;margin:0;padding:0;background:none;border-radius:0}
  .card-bottom{grid-column:4/7;display:contents}
  .cb-item{background:none;padding:0}
  .card-meta{grid-column:1}
  .hedge-btn{grid-column:1/-1}
  .hedge-panel{grid-column:1/-1}
  .prob-n{font-size:24px}
  .sc-n{font-size:28px}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <img id="mascot" class="mascot" alt="F">
    <div><div class="brand">FREEMAN</div><div class="sub">LIVE CALCUTTA — NCAA 2026</div></div>
    <div id="liveBadge" style="display:none;margin-left:auto;display:flex;align-items:center;gap:5px;animation:pulse 1.2s infinite">
      <div style="width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red)"></div>
      <span id="liveCount" style="font-size:11px;font-weight:800;color:var(--red);letter-spacing:1px">0 LIVE</span>
    </div>
  </div>
  <div class="stats">
    <div class="st"><div class="st-l">DEPLOYED</div><div class="st-v" id="deployed">$0</div><div class="st-s" id="deployedEff"></div></div>
    <div class="st"><div class="st-l">WINNINGS</div><div class="st-v" id="winnings" style="color:var(--muted)">$0</div><div class="st-s" id="winsCount">0 wins</div></div>
    <div class="st"><div class="st-l">NET P&L</div><div class="st-v" id="netPL">$0</div><div class="st-s" id="netPct"></div></div>
    <div class="st"><div class="st-l">ALIVE</div><div class="st-v" id="alive">19/19</div><div class="st-s">pot $6.08M</div></div>
    <div class="st" style="flex:0 0 auto;display:flex;align-items:center;justify-content:center"><button class="cpbtn" id="copyBtn" onclick="copyUpdate()">📋 Copy</button></div>
  </div>
  <div class="conn">
    <div class="conn-d" id="connDot" style="background:var(--amber)"></div>
    <span id="connText">Connecting...</span>
    <button class="rbtn" onclick="fetchScores()">⟳</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('freeman')">🏀 FREEMAN</button>
  <button class="tab" onclick="switchTab('standings')">🏆 STANDINGS</button>
</div>

<div class="tab-content active" id="tab-freeman">
<div class="filters" id="filters"></div>
<div class="payouts" id="payouts"></div>
<div class="cards" id="cards"></div>

<div class="legend">
  <div class="lg-i"><div class="lg-d" style="background:#22c55e"></div><span class="lg-t">75%+ STRONG</span></div>
  <div class="lg-i"><div class="lg-d" style="background:#65a30d"></div><span class="lg-t">50-74%</span></div>
  <div class="lg-i"><div class="lg-d" style="background:#d97706"></div><span class="lg-t">25-49%</span></div>
  <div class="lg-i"><div class="lg-d" style="background:#ea580c"></div><span class="lg-t">10-24%</span></div>
  <div class="lg-i"><div class="lg-d" style="background:#dc2626"></div><span class="lg-t">&lt;10%</span></div>
</div>
</div>

<div class="tab-content" id="tab-standings">
<div class="standings" id="standings"></div>
</div>
<div class="footer">FREEMAN SYNDICATE — ESPN LIVE — 30s REFRESH — WIN PROB: SCORE DIFF × TIME</div>

function ncdf(x){const a1=.254829592,a2=-.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=.3275911,s=x<0?-1:1,ax=Math.abs(x)/1.4142135,t=1/(1+p*ax),y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-ax*ax);return .5*(1+s*y)}
function wp(u,t,p,c){if(!c)return 50;const[m,s]=(c||"0:00").split(":").map(Number),cs=(m||0)*60+(s||0),left=p<=1?cs+1200:cs,d=u-t,f=Math.max(left/2400,.001),sig=11*Math.sqrt(f);return Math.max(1,Math.min(99,Math.round(ncdf(d/sig)*100)))}

function americanToDecimal(odds){
  const n=parseFloat(odds);
  if(isNaN(n))return null;
  if(n>0) return 1+(n/100);
  if(n<0) return 1+(100/Math.abs(n));
  return null;
}

function calcHedge(team){
  const key=team.replace(/[^a-zA-Z]/g,"");
  const input=document.getElementById("hml-"+key);
  const result=document.getElementById("hresult-"+key);
  const t=S.find(x=>x.team===team);
  if(!t||!input||!result)return;

  const odds=input.value.trim();
  const dec=americanToDecimal(odds);
  if(!dec){result.innerHTML="";return}

  // Calcutta equity calculation
  // Current banked winnings (from prior rounds)
  const banked=t.mr>0?(PAY.find(p=>p.r===t.mr)?.c||0)*t.own:0;
  // Next round payout if they win this game
  const nextRound=t.mr+1;
  const nextPay=(PAY.find(p=>p.r===nextRound)?.c||0)*t.own;
  // Incremental value of winning this game
  const incremental=nextPay-banked;
  // Total future value (rough estimate using win prob for remaining rounds)
  // For simplicity, just hedge the immediate next game's incremental value
  const V=incremental;

  // Hedge math:
  // If team WINS: profit = V - hedgeBet
  // If team LOSES: profit = hedgeBet * (decimalOdds - 1) 
  // Set equal: V - H = H * (D - 1)  →  H = V / D
  const H=V/dec;
  const guaranteedProfit=V-H;

  // Scenario profits
  const profitIfWin=V-H;
  const profitIfLose=H*(dec-1);

  // Total P&L including banked and cost
  const ec=t.cost*t.own;
  const totalIfWin=banked+profitIfWin-ec;
  const totalIfLose=banked+profitIfLose-ec;

  const gColor=guaranteedProfit>=0?"var(--green)":"var(--rl)";

  result.innerHTML=`
    <div class="hedge-results">
      <div class="hedge-stat"><span class="hedge-stat-l">Banked winnings</span><span class="hedge-stat-v">${fm(banked)}</span></div>
      <div class="hedge-stat"><span class="hedge-stat-l">Next round payout</span><span class="hedge-stat-v">${fm(nextPay)}</span></div>
      <div class="hedge-stat"><span class="hedge-stat-l">Incremental value at stake</span><span class="hedge-stat-v" style="color:var(--al)">${fm(V)}</span></div>
      <div class="hedge-stat"><span class="hedge-stat-l">Opponent decimal odds</span><span class="hedge-stat-v">${dec.toFixed(3)}</span></div>
      <div class="hedge-stat" style="border-top:1px solid #333;padding-top:6px;margin-top:4px"><span class="hedge-stat-l">🎯 OPTIMAL HEDGE BET</span><span class="hedge-stat-v" style="color:var(--al);font-size:16px">${fm(H)}</span></div>

      <div class="hedge-scenario win" style="margin-top:10px">
        <div class="hedge-scenario-title" style="color:var(--gl)">✅ IF ${t.team.toUpperCase()} WINS</div>
        <div class="hedge-stat"><span class="hedge-stat-l">Calcutta gain</span><span class="hedge-stat-v" style="color:var(--gl)">+${fm(V)}</span></div>
        <div class="hedge-stat"><span class="hedge-stat-l">Hedge bet lost</span><span class="hedge-stat-v" style="color:var(--rl)">-${fm(H)}</span></div>
        <div class="hedge-stat"><span class="hedge-stat-l">Net from this game</span><span class="hedge-stat-v" style="color:var(--gl)">${fp(profitIfWin)}</span></div>
        <div class="hedge-stat"><span class="hedge-stat-l">Overall P&L</span><span class="hedge-stat-v" style="color:${totalIfWin>=0?"var(--gl)":"var(--rl)"}">${fp(totalIfWin)}</span></div>
      </div>

      <div class="hedge-scenario lose" style="margin-top:6px">
        <div class="hedge-scenario-title" style="color:var(--rl)">❌ IF ${t.team.toUpperCase()} LOSES</div>
        <div class="hedge-stat"><span class="hedge-stat-l">Calcutta gain</span><span class="hedge-stat-v">$0</span></div>
        <div class="hedge-stat"><span class="hedge-stat-l">Hedge bet won</span><span class="hedge-stat-v" style="color:var(--gl)">+${fm(H*(dec-1))}</span></div>
        <div class="hedge-stat"><span class="hedge-stat-l">Net from this game</span><span class="hedge-stat-v" style="color:var(--gl)">${fp(profitIfLose)}</span></div>
        <div class="hedge-stat"><span class="hedge-stat-l">Overall P&L</span><span class="hedge-stat-v" style="color:${totalIfLose>=0?"var(--gl)":"var(--rl)"}">${fp(totalIfLose)}</span></div>
      </div>

      <div class="hedge-guarantee">
        <div class="hedge-guarantee-l">GUARANTEED PROFIT FROM THIS GAME</div>
        <div class="hedge-guarantee-v" style="color:${gColor}">${fp(guaranteedProfit)}</div>
      </div>
    </div>
  `;
}

function copyUpdate(){
  const raw=S.reduce((s,t)=>s+t.cost,0),eff=S.reduce((s,t)=>s+t.cost*t.own,0);
  const al=S.filter(t=>t.st!=="final_loss"),wc=S.filter(t=>t.mr>0);
  const lv=S.filter(t=>t.st==="live");
  const wa=S.reduce((tot,t)=>{if(t.mr>0){const r=PAY.find(p=>p.r===t.mr);if(r)return tot+r.c*t.own}return tot},0);
  const net=wa-eff,pct=eff>0?((net/eff)*100).toFixed(1):"0.0";
  const pre=S.filter(t=>t.st==="pre");
  const today=new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});

  let msg=`🏀 FREEMAN UPDATE — ${today}\n\n`;
  msg+=`💰 Deployed: ${fm(eff)}\n`;
  msg+=`🏆 Winnings: ${fm(wa)}\n`;
  msg+=net>=0?`📈 Net P&L: ${fp(net)} (${pct}%)\n`:`📉 Net P&L: ${fp(net)} (${pct}%)\n`;
  msg+=`👥 Alive: ${al.length}/${S.length}\n`;

  if(lv.length>0){
    msg+=`\n🔴 LIVE NOW:\n`;
    lv.forEach(t=>{
      msg+=`  ${t.team} ${t.us}-${t.th} vs ${t.opp} (${t.prob}%)\n`;
    });
  }

  if(wc.length>0){
    msg+=`\n✅ WINS:\n`;
    wc.forEach(t=>{
      const w=(PAY.find(p=>p.r===t.mr)?.c||0)*t.own;
      const rd=PAY.find(p=>p.r===t.mr)?.l||"";
      msg+=`  ${t.team} — ${rd} → ${fm(w)}\n`;
    });
  }

  const losses=S.filter(t=>t.st==="final_loss");
  if(losses.length>0){
    msg+=`\n❌ OUT:\n`;
    losses.forEach(t=>{
      msg+=`  ${t.team} ${t.us!==null?t.us+"-"+t.th:""}\n`;
    });
  }

  if(pre.length>0){
    msg+=`\n⏳ STILL TO PLAY: ${pre.map(t=>t.team).join(", ")}\n`;
  }

  msg+=`\n🎯 Pot: $6,077,500`;

  navigator.clipboard.writeText(msg).then(()=>{
    const btn=$("copyBtn");
    btn.textContent="✓ Copied!";
    btn.classList.add("copied");
    setTimeout(()=>{btn.textContent="📋 Copy";btn.classList.remove("copied")},2000);
  }).catch(()=>{
    // Fallback for older browsers
    const ta=document.createElement("textarea");
    ta.value=msg;ta.style.position="fixed";ta.style.opacity="0";
    document.body.appendChild(ta);ta.select();
    try{document.execCommand("copy");const btn=$("copyBtn");btn.textContent="✓ Copied!";btn.classList.add("copied");setTimeout(()=>{btn.textContent="📋 Copy";btn.classList.remove("copied")},2000)}catch(e){}
    document.body.removeChild(ta);
  });
}

async function fetchScores(){
  try{
    const ds=[];const now=new Date();
    for(let d=-2;d<=2;d++){const dt=new Date(now);dt.setDate(dt.getDate()+d);ds.push(dt.toISOString().slice(0,10).replace(/-/g,""))}
    let games=[];
    for(const d of ds){try{const r=await fetch(`${API}?dates=${d}&groups=100&limit=100`);if(r.ok){const j=await r.json();if(j.events)games=games.concat(j.events)}}catch(e){}}

    S.forEach(ft=>{
      ft.st="pre";ft.us=null;ft.th=null;ft.clk="";ft.per=0;ft.prob=ft.pp;ft.det="Upcoming";
      let matches=[];
      for(const ev of games){const c=ev.competitions?.[0];if(!c)continue;for(const tm of c.competitors){if(mt(tm.team?.displayName||tm.team?.name||"",tm.team?.abbreviation||"",ft)){matches.push({comp:c,our:tm,time:ev.date||c.date||""});break}}}
      if(!matches.length)return;

      // Separate by status
      const live=[],closed=[],sched=[];
      matches.forEach(g=>{
        const sn=g.comp.status?.type?.name||"";
        if(sn==="STATUS_IN_PROGRESS"||sn==="STATUS_HALFTIME") live.push(g);
        else if(sn==="STATUS_FINAL"||sn==="STATUS_END_PERIOD") closed.push(g);
        else sched.push(g);
      });

      // Process ALL completed games to tally wins and detect elimination
      let eliminated=false, wins=0;
      closed.forEach(g=>{
        const u=parseInt(g.our.score)||0,t=parseInt(g.comp.competitors.find(c=>c.id!==g.our.id)?.score)||0;
        if(u>t) wins++;
        else eliminated=true;
      });
      ft.mr=ft.playIn?Math.max(0,wins-1):wins;

      // Determine what to display: live > scheduled (if alive) > latest closed
      let show=null;
      if(live.length>0) show=live[0];
      else if(!eliminated && sched.length>0){ sched.sort((a,b)=>(a.time||"").localeCompare(b.time||"")); show=sched[0]; }
      else if(closed.length>0){ closed.sort((a,b)=>(b.time||"").localeCompare(a.time||"")); show=closed[0]; }
      if(!show) return;

      const{comp,our}=show;
      const op=comp.competitors.find(c=>c.id!==our.id);
      // Update opponent name and seed dynamically from ESPN
      const opName=op?.team?.shortDisplayName||op?.team?.displayName||op?.team?.name||ft.opp;
      const opAbbr=op?.team?.abbreviation||"";
      ft.opp=opName;
      if(SEEDS[opAbbr]) ft.os=SEEDS[opAbbr];
      const u=parseInt(our.score)||0,t=parseInt(op?.score)||0;
      const sn=comp.status?.type?.name||"",clk=comp.status?.displayClock||"",per=comp.status?.period||0,det=comp.status?.type?.shortDetail||comp.status?.type?.detail||"";
      if(sn==="STATUS_IN_PROGRESS"||sn==="STATUS_HALFTIME"){ft.st="live";ft.us=u;ft.th=t;ft.clk=clk;ft.per=per;ft.prob=sn==="STATUS_HALFTIME"?wp(u,t,1,"0:00"):wp(u,t,per,clk);ft.det=det}
      else if(sn==="STATUS_FINAL"||sn==="STATUS_END_PERIOD"){ft.us=u;ft.th=t;ft.clk="";ft.det=det;if(u>t){ft.st="final_win";ft.prob=100;ft.mr=Math.max(ft.mr,1)}else{ft.st="final_loss";ft.prob=0}}
      else{ft.det=det||"Upcoming"}
    });
    polls++;
    updateAllResults(games);
    $("connDot").style.background="var(--gl)";
    $("connText").textContent="ESPN live — "+new Date().toLocaleTimeString()+" — polls: "+polls;
  }catch(e){$("connDot").style.background="var(--rl)";$("connText").textContent="Error: "+e.message}
  render();
  if($("tab-standings").classList.contains("active")) renderStandings();
}

function render(){
  let arr=[...S];
  if(sort==="status")arr.sort((a,b)=>{const o={live:0,pre:1,final_win:2,final_loss:3};return(o[a.st]??9)-(o[b.st]??9)||b.cost-a.cost});
  else if(sort==="cost")arr.sort((a,b)=>b.cost-a.cost);
  else if(sort==="prob")arr.sort((a,b)=>b.prob-a.prob);
  else if(sort==="seed")arr.sort((a,b)=>a.seed-b.seed);
  if(filt!=="all")arr=arr.filter(t=>t.region===filt);

  const raw=S.reduce((s,t)=>s+t.cost,0),eff=S.reduce((s,t)=>s+t.cost*t.own,0);
  const al=S.filter(t=>t.st!=="final_loss"),lv=S.filter(t=>t.st==="live"),wc=S.filter(t=>t.mr>0).length;
  const wa=S.reduce((tot,t)=>{if(t.mr>0){const r=PAY.find(p=>p.r===t.mr);if(r)return tot+r.c*t.own}return tot},0);
  const net=wa-eff,pct=eff>0?((net/eff)*100).toFixed(1):"0.0";

  $("deployed").textContent=fm(raw);$("deployedEff").textContent=fm(eff)+" eff.";
  $("winnings").textContent=fm(wa);$("winnings").style.color=wa>0?"var(--green)":"var(--muted)";
  $("winsCount").textContent=wc+" win"+(wc!==1?"s":"");
  $("netPL").textContent=fp(net);$("netPL").style.color=net>0?"var(--green)":net<0?"var(--rl)":"var(--text)";
  $("netPct").textContent=(net>=0?"+":"")+pct+"%";$("netPct").style.color=net>0?"var(--gl)":net<0?"var(--al)":"#94a3b8";
  $("alive").textContent=al.length+"/"+S.length;
  if(lv.length>0){$("liveBadge").style.display="flex";$("liveCount").textContent=lv.length+" LIVE"}else{$("liveBadge").style.display="none"}

  $("cards").innerHTML=arr.map(t=>{
    const r=rag(t.prob),dead=t.st==="final_loss",live=t.st==="live",won=t.st==="final_win";
    const ec=t.cost*t.own,tw=t.mr>0?(PAY.find(p=>p.r===t.mr)?.c||0)*t.own:0,tpl=tw-ec;
    const roi=((PAY[0].c*t.own-ec)/ec*100).toFixed(0);
    let badge="";if(live)badge='<span class="stb stb-live">● LIVE</span>';else if(won)badge='<span class="stb stb-win">✓ WIN</span>';else if(dead)badge='<span class="stb stb-out">✗ OUT</span>';

    let scoreHTML="";
    if(t.us!==null){
      const uc=t.us>=t.th?"#f1f5f9":"#94a3b8",tc=t.th>t.us?"#f1f5f9":"#64748b";
      const ci=live&&t.clk?`<div class="sc-clk">${t.per<=1?"1H":t.per===2?"2H":"OT"} ${t.clk}</div>`:"";
      scoreHTML=`<div class="score-row"><div class="sc-side"><div class="sc-lbl" style="color:var(--gl)">FMN</div><div class="sc-n" style="color:${uc}">${t.us}</div></div><div class="sc-dash">—</div><div class="sc-side"><div class="sc-lbl" style="color:#94a3b8">OPP</div><div class="sc-n" style="color:${tc}">${t.th}</div></div><div class="sc-info"><div class="sc-opp">(${t.os}) ${t.opp}</div>${ci}</div></div>`;
    }else{
      scoreHTML=`<div class="matchup-wrap"><div class="matchup">vs (${t.os}) ${t.opp}</div><div class="spread">Line: ${t.sp>0?"+":""}${t.sp} · ${t.det}</div></div>`;
    }

    const pc=dead?"#4b5563":won?"var(--green)":r.t;
    const pl=dead?"ELIM":won?"WON":live?"LIVE":r.l;

    return `<div class="card${dead?" dead":""}" style="background:${dead?"#0d0d12":`linear-gradient(135deg,${r.bg}${live?"66":"33"},#0d0d14${live?"aa":"cc"})`};border:${dead?"1px solid #1a1a20":`1px solid ${r.b}${live?"66":"22"}`};border-left:${dead?"4px solid #333":`4px solid ${r.b}`};${live?`box-shadow:0 0 12px ${r.b}22`:""}">
      <div class="card-top">
        <div>
          <div class="card-team"><span class="tname${dead?" x":""}">${t.team}</span><span class="sbadge">${t.seed}</span>${badge}</div>
          <div class="card-meta">${t.region}${t.own<1?`<span class="own-tag">(${t.own*100}%)</span>`:""}</div>
        </div>
        <div class="card-prob"><div class="prob-n" style="color:${pc}">${t.prob}%</div><div class="prob-t" style="color:${pc}">${pl}</div></div>
      </div>
      ${scoreHTML}
      <div class="card-bottom">
        <div class="cb-item"><div class="cb-l">COST</div><div class="cb-v">${fm(t.cost)}</div>${t.own<1?`<div style="font-size:8px;color:var(--amber)">${fm(ec)} eff.</div>`:""}</div>
        <div class="cb-item"><div class="cb-l">WON</div><div class="cb-v" style="color:${tw>0?"var(--green)":"#4b5563"}">${tw>0?fm(tw):"—"}</div></div>
        <div class="cb-item"><div class="cb-l">${t.mr>0?"P&L":"R64 ROI"}</div>${t.mr>0?`<div class="cb-v" style="color:${tpl>=0?"var(--gl)":"var(--rl)"}">${fp(tpl)}</div>`:`<div class="cb-v" style="color:${parseInt(roi)>0?"var(--gl)":"var(--rl)"}">${parseInt(roi)>0?"+":""}${roi}%</div>`}</div>
      </div>
      ${live?`<button class="hedge-btn" onclick="toggleHedge('${t.team}')">⚖️ HALFTIME HEDGE CALCULATOR</button>
      <div class="hedge-panel" id="hedge-${t.team.replace(/[^a-zA-Z]/g,"")}">
        <div class="hedge-title">⚖️ Hedge Calculator — ${t.team}</div>
        <div class="hedge-row">
          <span class="hedge-label">OPP MONEYLINE</span>
          <input class="hedge-input" id="hml-${t.team.replace(/[^a-zA-Z]/g,"")}" type="text" placeholder="+150" oninput="calcHedge('${t.team}')">
        </div>
        <div class="hedge-hint">Enter American odds for ${t.opp} to win (e.g. +150 or -110)</div>
        <div id="hresult-${t.team.replace(/[^a-zA-Z]/g,"")}"></div>
      </div>`:""}
    </div>`;
  }).join("");
}

// Track all teams' results globally (abbr → {wins, eliminated, status})
let allResults={};

function updateAllResults(games){
  // Reset
  allResults={};
  // For each team abbreviation across all owners, find their games
  const allAbbrs=new Set();
  Object.values(OWNERS).forEach(teams=>teams.forEach(t=>allAbbrs.add(t.abbr)));

  allAbbrs.forEach(abbr=>{
    let wins=0,eliminated=false,alive=true,st="pre";
    const isPlayIn=Object.values(OWNERS).flat().find(t=>t.abbr===abbr&&t.playIn);

    for(const ev of games){
      const c=ev.competitions?.[0];if(!c)continue;
      const tm=c.competitors.find(x=>(x.team?.abbreviation||"")==abbr);
      if(!tm)continue;
      const sn=c.status?.type?.name||"";
      if(sn==="STATUS_FINAL"||sn==="STATUS_END_PERIOD"){
        const opp=c.competitors.find(x=>x.id!==tm.id);
        const u=parseInt(tm.score)||0,t=parseInt(opp?.score)||0;
        if(u>t) wins++;
        else{eliminated=true;alive=false;st="final_loss"}
      }else if(sn==="STATUS_IN_PROGRESS"||sn==="STATUS_HALFTIME"){
        st="live";
      }
    }
    if(!eliminated&&wins>0) st="advancing";
    const mr=isPlayIn?Math.max(0,wins-1):wins;
    allResults[abbr]={wins,mr,eliminated,alive:!eliminated,st};
  });
}

function renderStandings(){
  const el=$("standings");
  const ownerData=Object.entries(OWNERS).map(([name,teams])=>{
    const invested=teams.reduce((s,t)=>s+t.cost*t.own,0);
    const winnings=teams.reduce((s,t)=>{
      const r=allResults[t.abbr];
      if(r&&r.mr>0){const p=PAY.find(x=>x.r===r.mr);if(p)return s+p.c*t.own}
      return s;
    },0);
    const aliveCount=teams.filter(t=>{const r=allResults[t.abbr];return !r||r.alive}).length;
    const pl=winnings-invested;
    const roi=invested>0?((pl/invested)*100).toFixed(1):"0.0";
    return{name,teams,invested,winnings,aliveCount,total:teams.length,pl,roi};
  });

  // Sort by P&L descending
  ownerData.sort((a,b)=>b.pl-a.pl);

  const colors={"Freeman":"var(--green)","Buckets":"#60a5fa","Ward":"#c084fc","Adultos":"#f472b6","Hooter":"#fb923c","Kerlin":"#38bdf8"};

  el.innerHTML=`<div class="standings-title">🏆 LEAGUE STANDINGS</div>`+
    ownerData.map((o,i)=>{
      const c=colors[o.name]||"var(--text)";
      const plCol=o.pl>=0?"var(--gl)":"var(--rl)";
      const teamList=o.teams.map(t=>{
        const r=allResults[t.abbr];
        const cls=r?.eliminated?"stand-team-dead":r?.mr>0?"stand-team-won":"stand-team-alive";
        const roundLabel=r?.mr>0?` ✓${PAY.find(p=>p.r===r.mr)?.l||""}`:"";
        const ownTag=t.own<1?` (${t.own*100}%)`:"";
        return`<span class="${cls}">${t.name}${ownTag}${roundLabel}</span>`;
      }).join(" · ");

      return`<div class="stand-card" style="border-left:4px solid ${c}">
        <div class="stand-top">
          <div class="stand-rank" style="color:${c}">${i+1}</div>
          <div class="stand-name" style="color:${c}">${o.name}</div>
          <div class="stand-pl">
            <div class="stand-pl-v" style="color:${plCol}">${fp(o.pl)}</div>
            <div class="stand-pl-pct" style="color:${plCol}">${o.pl>=0?"+":""}${o.roi}%</div>
          </div>
        </div>
        <div class="stand-stats">
          <div class="stand-stat"><div class="stand-stat-l">INVESTED</div><div class="stand-stat-v">${fm(o.invested)}</div></div>
          <div class="stand-stat"><div class="stand-stat-l">WINNINGS</div><div class="stand-stat-v" style="color:${o.winnings>0?"var(--green)":"#4b5563"}">${o.winnings>0?fm(o.winnings):"—"}</div></div>
          <div class="stand-stat"><div class="stand-stat-l">NET P&L</div><div class="stand-stat-v" style="color:${plCol}">${fp(o.pl)}</div></div>
          <div class="stand-stat"><div class="stand-stat-l">ALIVE</div><div class="stand-stat-v">${o.aliveCount}/${o.total}</div></div>
        </div>
        <div class="stand-teams">${teamList}</div>
      </div>`;
    }).join("");
}

function switchTab(tab){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  if(tab==="freeman"){
    document.querySelectorAll(".tab")[0].classList.add("active");
    $("tab-freeman").classList.add("active");
  }else{
    document.querySelectorAll(".tab")[1].classList.add("active");
    $("tab-standings").classList.add("active");
    renderStandings();
  }
}

  render();

  setInterval(fetchScores,30000);
})();
